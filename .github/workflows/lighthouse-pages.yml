name: Lighthouse skill-gen Web UI

on:
  push:
    branches: ["main"]
    paths:
      - "tools/skill-gen/**"
      - ".github/workflows/lighthouse-pages.yml"
  pull_request:
    paths:
      - "tools/skill-gen/**"
      - ".github/workflows/lighthouse-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/skill-gen/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix tools/skill-gen

      - name: Build static site artifact for Lighthouse
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R tools/skill-gen/web/. _site/
          cp tools/skill-gen/skillgen-core.js _site/skillgen-core.js
          sed -i 's#../skillgen-core.js#./skillgen-core.js#g' _site/index.html
          sed -i 's#../skillgen-core.js#./skillgen-core.js#g' _site/index.zh-TW.html
          cat > _site/lhci.css <<'EOF'
          * {
            animation: none !important;
            transition: none !important;
          }
          body {
            background: #111 !important;
            color: #eee !important;
          }
          .bg-grid {
            display: none !important;
          }
          .panel {
            backdrop-filter: none !important;
          }
          EOF
          sed -i 's#<link rel="stylesheet" href="./style.css" />#<link rel="stylesheet" href="./style.css" />\n    <link rel="stylesheet" href="./lhci.css" />#g' _site/index.html
          sed -i 's#<link rel="stylesheet" href="./style.css" />#<link rel="stylesheet" href="./style.css" />\n    <link rel="stylesheet" href="./lhci.css" />#g' _site/index.zh-TW.html

      - name: Start local server
        run: |
          npx --yes http-server _site -a 127.0.0.1 -p 4173 -c-1 >/tmp/skill-gen-http.log 2>&1 &
          echo $! > /tmp/skill-gen-http.pid
          npx --yes wait-on http://127.0.0.1:4173/index.html http://127.0.0.1:4173/index.zh-TW.html

      - name: Sanity check served pages
        run: |
          curl -fsS http://127.0.0.1:4173/index.html | head -n 5
          curl -fsS http://127.0.0.1:4173/index.zh-TW.html | head -n 5
          curl -I http://127.0.0.1:4173/index.html
          curl -I http://127.0.0.1:4173/index.zh-TW.html

      - name: Run Lighthouse collect in virtual display (xvfb)
        run: |
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi
          xvfb-run -a npx --yes @lhci/cli@0.15.x collect --config=./tools/skill-gen/lighthouserc.json

      - name: Upload Lighthouse reports to temporary public storage
        run: |
          npx --yes @lhci/cli@0.15.x upload --target=temporary-public-storage --config=./tools/skill-gen/lighthouserc.json

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-reports
          path: .lighthouseci
          if-no-files-found: ignore

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/skill-gen-http.pid ]; then
            kill "$(cat /tmp/skill-gen-http.pid)" || true
          fi
          if [ -f /tmp/skill-gen-http.log ]; then
            echo "---- http-server log ----"
            cat /tmp/skill-gen-http.log
          fi
