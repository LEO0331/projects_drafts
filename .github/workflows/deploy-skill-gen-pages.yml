name: Deploy skill-gen Web UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "tools/skill-gen/web/**"
      - "tools/skill-gen/skillgen-core.js"
      - ".github/workflows/deploy-skill-gen-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R tools/skill-gen/web/. _site/
          cp tools/skill-gen/skillgen-core.js _site/skillgen-core.js
          sed -i 's#../skillgen-core.js#./skillgen-core.js#g' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
