name: Deploy skill-gen Web UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "tools/skill-gen/web/**"
      - "tools/skill-gen/skillgen-core.js"
      - ".github/workflows/deploy-skill-gen-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R tools/skill-gen/web/. _site/
          cp tools/skill-gen/skillgen-core.js _site/skillgen-core.js
          sed -i 's#../skillgen-core.js#./skillgen-core.js#g' _site/index.html
          cat > _site/home.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>skill-gen Web UI</title>
              <style>
                body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #111; color: #f4f4f4; display: grid; place-items: center; min-height: 100vh; }
                .card { width: min(520px, 92vw); border: 1px solid #333; border-radius: 12px; padding: 20px; background: #1b1b1b; }
                h1 { margin-top: 0; font-size: 1.3rem; }
                a { display: block; margin: 10px 0; color: #6ec1ff; text-decoration: none; }
                a:hover { text-decoration: underline; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>skill-gen Web UI</h1>
                <a href="./index.html">English UI</a>
                <a href="./index.zh-TW.html">繁體中文介面</a>
              </div>
            </body>
          </html>
          HTML
          mv _site/index.html _site/index.en.html
          mv _site/home.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
